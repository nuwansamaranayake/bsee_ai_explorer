services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_error_50x.html:/usr/share/nginx/html/error_50x.html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/bsee.db
      - CHROMA_PATH=/app/data/chroma
      - PDF_PATH=/app/data/pdfs
    volumes:
      - sqlite_data:/app/data
      - chroma_data:/app/data/chroma
      - pdf_store:/app/data/pdfs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); r.raise_for_status(); d=r.json(); print(f'v{d[\"version\"]} ai={d[\"ai_available\"]}')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  sqlite_data:
  chroma_data:
  pdf_store:

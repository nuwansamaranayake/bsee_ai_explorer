upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # --- Security & Limits ---
    client_max_body_size 2m;          # Max request body (prevents abuse)
    client_body_timeout 30s;          # Timeout waiting for request body
    client_header_timeout 30s;        # Timeout waiting for headers

    # Hide nginx version
    server_tokens off;

    # --- Custom error pages (branded, not raw nginx HTML) ---
    error_page 502 503 504 /error_50x.html;
    location = /error_50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # --- API requests → FastAPI ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;      # Long timeout for AI analysis calls

        # Request body limit for API
        client_max_body_size 1m;

        # Disable buffering for SSE (streaming chat)
        proxy_buffering off;
        proxy_cache off;
    }

    # --- Health check → FastAPI ---
    location /health {
        proxy_pass http://backend;
        proxy_read_timeout 10s;
    }

    # --- Everything else → React SPA ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
